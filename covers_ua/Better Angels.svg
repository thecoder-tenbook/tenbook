<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 592">
  <rect width="400" height="592" fill="#EEF2F8"/>
  <!-- subtle graph lines -->
  <line x1="56" y1="336" x2="56" y2="80" stroke="#6080A0" stroke-width="1.5" opacity="0.25"/>
  <line x1="56" y1="336" x2="344" y2="336" stroke="#6080A0" stroke-width="1.5" opacity="0.25"/>
  <!-- declining violence trend line going down -->
  <polyline points="80,160 144,204 208,240 272,280 336,316" fill="none" stroke="#4A6A90" stroke-width="5" opacity="0.7" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="80" cy="160" r="7" fill="#4A6A90" opacity="0.65"/>
  <circle cx="144" cy="204" r="7" fill="#4A6A90" opacity="0.65"/>
  <circle cx="208" cy="240" r="7" fill="#4A6A90" opacity="0.65"/>
  <circle cx="272" cy="280" r="7" fill="#4A6A90" opacity="0.65"/>
  <circle cx="336" cy="316" r="9" fill="#4A6A90"/>
  <!-- decorative arcs -->
  <path d="M130,110 Q200,70 270,110" fill="none" stroke="#8AAAC8" stroke-width="2.5" opacity="0.4" stroke-linecap="round"/>
  <path d="M100,96 Q200,40 300,96" fill="none" stroke="#8AAAC8" stroke-width="1.5" opacity="0.22" stroke-linecap="round"/>
  <!-- divider -->
  <line x1="56" y1="384" x2="344" y2="384" stroke="#A8B8C8" stroke-width="1"/>
  <!-- title -->
  <text x="200" y="420" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="700" fill="#0A1A2A" letter-spacing="0.5">КРАЩА ПРИРОДА</text>
  <text x="200" y="450" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="700" fill="#0A1A2A" letter-spacing="0.5">ЛЮДИНИ</text>
  <line x1="120" y1="468" x2="280" y2="468" stroke="#8AAAC8" stroke-width="1"/>
  <text x="200" y="510" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#4A6080" letter-spacing="1">Стівен Пінкер</text>
</svg>
