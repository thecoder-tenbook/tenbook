<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 592">
  <rect width="400" height="592" fill="#F4EEF8"/>
  <!-- cluster of dots (8 CEOs metaphor) -->
  <circle cx="132" cy="216" r="20" fill="#9080C0" opacity="0.3"/>
  <circle cx="184" cy="184" r="20" fill="#9080C0" opacity="0.3"/>
  <circle cx="236" cy="216" r="20" fill="#9080C0" opacity="0.3"/>
  <circle cx="158" cy="260" r="20" fill="#9080C0" opacity="0.3"/>
  <circle cx="210" cy="260" r="20" fill="#9080C0" opacity="0.3"/>
  <circle cx="132" cy="304" r="20" fill="#9080C0" opacity="0.3"/>
  <circle cx="236" cy="304" r="20" fill="#9080C0" opacity="0.3"/>
  <!-- outsider dot — separated -->
  <circle cx="310" cy="124" r="24" fill="#5A3A9A" opacity="0.7"/>
  <circle cx="310" cy="124" r="10" fill="#8060C8" opacity="0.9"/>
  <!-- dashed connection -->
  <line x1="244" y1="208" x2="290" y2="140" stroke="#7050B0" stroke-width="2.5" opacity="0.35" stroke-dasharray="8,5" stroke-linecap="round"/>
  <!-- divider -->
  <line x1="56" y1="388" x2="344" y2="388" stroke="#C0B0E0" stroke-width="1"/>
  <!-- title -->
  <text x="200" y="432" text-anchor="middle" font-family="Georgia, serif" font-size="30" font-weight="700" fill="#1A0A3A" letter-spacing="2">АУТСАЙДЕРИ</text>
  <line x1="88" y1="450" x2="312" y2="450" stroke="#7050B0" stroke-width="1.5"/>
  <text x="200" y="480" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#7060A0" letter-spacing="2">ВІСІМ НЕСТАНДАРТНИХ CEO</text>
  <text x="200" y="520" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#4A3A7A" letter-spacing="1">Вільям Торндайк</text>
</svg>
